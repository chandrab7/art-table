<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8956a;stop-opacity:0.6"/>
      <stop offset="30%" style="stop-color:#d4a853;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#e8c87a;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#d4a853;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b8956a;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="blushGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b4b8"/>
      <stop offset="100%" style="stop-color:#d4a853"/>
    </linearGradient>
  </defs>

  <!-- Left decorative flourish -->
  <g transform="translate(30, 60)" opacity="0.7">
    <path d="M0,0 C15,-8 25,-5 35,0 C25,5 15,8 0,0Z" fill="none" stroke="url(#goldShine)" stroke-width="1"/>
    <path d="M-5,0 Q10,-20 40,-5" fill="none" stroke="url(#goldShine)" stroke-width="0.8"/>
    <path d="M-5,0 Q10,20 40,5" fill="none" stroke="url(#goldShine)" stroke-width="0.8"/>
    <circle cx="-8" cy="0" r="2" fill="#d4a853" opacity="0.5"/>
    <circle cx="42" cy="-5" r="1.5" fill="#d4a853" opacity="0.4"/>
    <circle cx="42" cy="5" r="1.5" fill="#d4a853" opacity="0.4"/>
    <!-- Extra vine curls -->
    <path d="M-8,0 Q-18,-10 -12,-18" fill="none" stroke="#d4a853" stroke-width="0.7" opacity="0.5"/>
    <path d="M-8,0 Q-18,10 -12,18" fill="none" stroke="#d4a853" stroke-width="0.7" opacity="0.5"/>
    <circle cx="-12" cy="-18" r="1" fill="#e8b4b8" opacity="0.4"/>
    <circle cx="-12" cy="18" r="1" fill="#e8b4b8" opacity="0.4"/>
  </g>

  <!-- "Art" in elegant serif -->
  <text x="80" y="52" font-family="Georgia, 'Playfair Display', serif" font-size="38" font-weight="400" fill="#e8b4b8" letter-spacing="4">Art</text>

  <!-- "of the" small connector -->
  <text x="172" y="48" font-family="Georgia, 'Playfair Display', serif" font-size="16" font-style="italic" fill="#8899aa" letter-spacing="2">of the</text>

  <!-- "Table" in elegant serif -->
  <text x="260" y="52" font-family="Georgia, 'Playfair Display', serif" font-size="38" font-weight="400" fill="#e8b4b8" letter-spacing="6">Table</text>

  <!-- Gold decorative line under text -->
  <line x1="80" y1="62" x2="420" y2="62" stroke="url(#goldShine)" stroke-width="0.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="250" y="82" font-family="'Segoe UI', sans-serif" font-size="11" fill="#d4a853" letter-spacing="5" text-anchor="middle" opacity="0.9">
    <tspan x="250">WE MAKE MEMORIES</tspan>
  </text>

  <!-- Small decorative diamond -->
  <g transform="translate(250, 95)" opacity="0.5">
    <polygon points="0,-4 3,0 0,4 -3,0" fill="#d4a853"/>
  </g>

  <!-- Right decorative flourish -->
  <g transform="translate(430, 42)" opacity="0.7">
    <path d="M0,0 C15,-8 25,-5 35,0 C25,5 15,8 0,0Z" fill="none" stroke="url(#goldShine)" stroke-width="1"/>
    <path d="M-5,0 Q10,-20 40,-5" fill="none" stroke="url(#goldShine)" stroke-width="0.8"/>
    <path d="M-5,0 Q10,20 40,5" fill="none" stroke="url(#goldShine)" stroke-width="0.8"/>
    <circle cx="42" cy="-5" r="1.5" fill="#d4a853" opacity="0.4"/>
    <circle cx="42" cy="5" r="1.5" fill="#d4a853" opacity="0.4"/>
    <!-- Extra vine curls -->
    <path d="M42,-5 Q52,-15 48,-22" fill="none" stroke="#d4a853" stroke-width="0.7" opacity="0.5"/>
    <path d="M42,5 Q52,15 48,22" fill="none" stroke="#d4a853" stroke-width="0.7" opacity="0.5"/>
    <circle cx="48" cy="-22" r="1" fill="#e8b4b8" opacity="0.4"/>
    <circle cx="48" cy="22" r="1" fill="#e8b4b8" opacity="0.4"/>
  </g>

  <!-- Decorative dots scattered -->
  <circle cx="70" cy="85" r="1" fill="#d4a853" opacity="0.3"/>
  <circle cx="430" cy="85" r="1" fill="#d4a853" opacity="0.3"/>
  <circle cx="140" cy="90" r="0.8" fill="#e8b4b8" opacity="0.2"/>
  <circle cx="360" cy="90" r="0.8" fill="#e8b4b8" opacity="0.2"/>
</svg>
